<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Carousel - Dynamic Light + GitHub Images</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0f2027, #000);
      overflow: hidden;
      color: white;
      font-family: Arial, sans-serif;
    }.scene {
  width: 320px;
  height: 320px;
  perspective: 1200px;
  cursor: grab;
}

.carousel {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}

.carousel img {
  position: absolute;
  width: 180px;
  height: 240px; /* 3:4 ratio */
  left: 50%;
  top: 50%;
  transform-origin: center;
  border-radius: 16px;
  object-fit: cover;
  opacity: 0.7;
  transition: all 0.4s ease;

  box-shadow: 0 20px 40px rgba(0,0,0,0.7);

  /* dynamic lighting */
  --x: 50%;
  --y: 50%;

  /* depth blur default */
  filter: blur(2px) brightness(0.75);
}

/* front image (focused) */
.carousel img.active {
  opacity: 1;
  filter: blur(0px) brightness(1.05);
  transform: scale(1.2) !important;
  z-index: 10;
  box-shadow: 0 35px 80px rgba(0,0,0,0.95), 0 0 30px rgba(0,255,255,0.4);
}

.carousel img::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: radial-gradient(circle at var(--x) var(--y), rgba(255,255,255,0.35), transparent 60%);
  pointer-events: none;
}

.carousel img:hover {
  opacity: 1;
  transform: scale(1.15) !important;
  box-shadow: 0 30px 70px rgba(0,0,0,0.9), 0 0 25px rgba(0,255,255,0.4);
}

.socials {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 20px;
  backdrop-filter: blur(12px);
  padding: 12px 24px;
  border-radius: 25px;
  background: rgba(255,255,255,0.08);
}

.socials a {
  color: white;
  font-size: 20px;
  transition: 0.3s;
}

.socials a:hover {
  color: #00f2fe;
  transform: scale(1.3);
}

  </style>
</head>
<body><div class="scene" id="scene">
  <div class="carousel" id="carousel">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/Golgappa.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/departure.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/sky.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/station.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/train.jpg.jpeg">
  </div>
</div><div class="socials">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-github"></i></a>
  <a href="#"><i class="fab fa-linkedin"></i></a>
  <a href="#"><i class="fab fa-twitter"></i></a>
</div><script>
  const carousel = document.getElementById('carousel');
  const images = carousel.querySelectorAll('img');
  const total = images.length;
  const radius = 260;

  images.forEach((img, i) => {
    const angle = (i / total) * 360;
    img.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
  });

  let isDragging = false;
  let startX;
  let currentRotation = 0;
  let velocity = 0;

  const scene = document.getElementById('scene');

  scene.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    velocity = 0;
    scene.style.cursor = 'grabbing';
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    scene.style.cursor = 'grab';
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const delta = e.clientX - startX;
    velocity = delta * 0.2;
    currentRotation += velocity;
    carousel.style.transform = `rotateY(${currentRotation}deg)`;
    startX = e.clientX;

    updateLight(e.clientX, e.clientY);
  });

  // inertia animation
  function animate() {
    if (!isDragging) {
      currentRotation += velocity;
      velocity *= 0.95; // friction
      carousel.style.transform = `rotateY(${currentRotation}deg)`;
    }
    requestAnimationFrame(animate);
  }
  animate();

  function updateLight(xPos, yPos) {
    const x = (xPos / window.innerWidth) * 100 + "%";
    const y = (yPos / window.innerHeight) * 100 + "%";

    images.forEach(img => {
      img.style.setProperty('--x', x);
      img.style.setProperty('--y', y);
    });
  }

  // Touch support
  scene.addEventListener('touchstart', (e) => {
    isDragging = true;
    startX = e.touches[0].clientX;
    velocity = 0;
  });

  window.addEventListener('touchend', () => {
    isDragging = false;
  });

  window.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const delta = touch.clientX - startX;
    velocity = delta * 0.2;
    currentRotation += velocity;
    carousel.style.transform = `rotateY(${currentRotation}deg)`;
    startX = touch.clientX;

    updateLight(touch.clientX, touch.clientY);
  });
</script><!-- Background Music --><audio id="bg-music" autoplay loop>
  <!-- Replace with your GitHub raw audio link -->
  <source src="https://raw.githubusercontent.com/yourusername/repo/main/music.mp3" type="audio/mpeg">
</audio><script>
  // autoplay fix for browsershttps://raw.githubusercontent.com/kunal21023/glimpses/main/station.jpg.jpeg
  document.body.addEventListener('click', () => {
    const music = document.getElementById('bg-music');
    music.play();
  }, { once: true });
</script></body>
</html>
