<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Carousel FINAL BOSS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at center, #0f2027, #000);
  overflow:hidden;
  font-family:Arial;
}

.scene {
  width:min(90vw,360px);
  height:min(90vw,360px);
  perspective:1200px;
}

.carousel {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
}

.carousel img {
  position:absolute;
  width:45%;
  height:60%;
  left:50%;
  top:50%;
  transform-origin:center;
  border-radius:16px;
  object-fit:cover;
  transition:all .5s ease;
  box-shadow:0 20px 40px rgba(0,0,0,.7);
}

/* particles */
.particle {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:.3;
  border-radius:50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

#music-btn {
  position:fixed;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.1);
  color:white;
  font-size:20px;
  backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div class="scene" id="scene">
  <div class="carousel" id="carousel">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/Golgappa.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/departure.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/sky.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/station.jpg.jpeg">
    <img src="https://raw.githubusercontent.com/kunal21023/glimpses/main/train.jpg.jpeg">
  </div>
</div>

<button id="music-btn"><i class="fas fa-play"></i></button>

<!-- ✅ FIXED AUDIO -->
<audio id="bg-music" loop autoplay>
  <source src="https://raw.githubusercontent.com/kunal21023/glimpses/main/mp3.mp3" type="audio/mpeg">
</audio>

<script>
const carousel = document.getElementById('carousel');
const images = carousel.querySelectorAll('img');
const total = images.length;

let radius = window.innerWidth < 500 ? 180 : 260;

function setup(){
  radius = window.innerWidth < 500 ? 180 : 260;
  images.forEach((img,i)=>{
    const angle = (i/total)*360;
    img.dataset.angle = angle;
    img.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
  });
}
setup();

window.addEventListener('resize', setup);

let currentRotation=0, velocity=0, isDragging=false, idle=true;
let startX;

const scene = document.getElementById('scene');

scene.addEventListener('mousedown',e=>{
  isDragging=true;
  idle=false;
  startX=e.clientX;
  velocity=0;
});

window.addEventListener('mouseup',()=>{
  isDragging=false;
  setTimeout(()=>idle=true,2000);
});

window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  let delta=e.clientX-startX;
  velocity=delta*.25;
  currentRotation+=velocity;
  startX=e.clientX;
});

function animate(){
  if(!isDragging){
    if(idle) velocity += 0.02;
    currentRotation += velocity;
    velocity *= 0.93;
  }

  carousel.style.transform=`rotateY(${currentRotation}deg)`;
  updateFocus();
  requestAnimationFrame(animate);
}
animate();

function updateFocus(){
  images.forEach((img,i)=>{
    let base=(i/total)*360;
    let angle=(base+currentRotation)%360;
    if(angle<0) angle+=360;

    let diff=Math.min(angle,360-angle);
    let t=1-diff/180;

    let scale=.85+t*.4;
    let blur=1.5*(1-t);
    let bright=.7+t*.5;

    img.style.transform=`rotateY(${base}deg) translateZ(${radius}px) scale(${scale})`;
    img.style.filter=`blur(${blur}px) brightness(${bright})`;
    img.style.opacity=.6+t*.4;
    img.style.zIndex=Math.floor(t*100);
  });
}

// click center
images.forEach((img,i)=>{
  img.onclick=()=>{
    currentRotation = -(i/total)*360;
  }
});

// music
const music=document.getElementById('bg-music');
const btn=document.getElementById('music-btn');
let playing=false;

btn.onclick=()=>{
  if(!playing){
    music.play();
    btn.innerHTML='<i class="fas fa-pause"></i>';
  } else {
    music.pause();
    btn.innerHTML='<i class="fas fa-play"></i>';
  }
  playing=!playing;
};

// particles
for(let i=0;i<40;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(5+Math.random()*10)+'s';
  document.body.appendChild(p);
}
</script>

</body>
</html>
